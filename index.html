<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Potatos. - 土匪potato的赛博实验室</title>
    <link rel="icon" type="image/png" href="resource/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        .background-cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('resource/home_background.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-color: #1a1a2e;
            transition: all 0.2s ease;
            z-index: 1;
        }
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: rgba(136, 136, 136, 0.5);
            z-index: 2;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        /* 左侧区域：包含logo和标题，均设为可点击 */
        .left-section {
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
        }
        .logo {
            height: 50px;
            width: auto;
            object-fit: contain;
            display: block;
        }
        /* 右侧区域：导航链接 + 搜索框 */
        .right-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }
        /* 搜索框样式 */
        .search-box {
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 5px 12px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .search-box:hover,
        .search-box:focus-within {
            background-color: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
        }
        .search-input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
            width: 180px;
            padding: 6px 0;
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }
        .search-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            cursor: pointer;
        }
        .search-icon svg path {
            stroke: rgba(255, 255, 255, 0.8);
        }
        .brand-name {
            color: white;
            font-size: 32px;
            font-weight: normal;
            line-height: 1;
            letter-spacing: 0.5px;
            text-decoration: none;
        }
        /* 标题保持可点击但无下划线 */
        .brand-name:hover {
            opacity: 0.8;
        }
        .nav-link {
            color: #C3C3C3;
            font-size: 14px;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }
        .nav-link:hover {
            opacity: 0.7;
            text-decoration: underline;
        }
        .dropdown {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .dropbtn {
            background: none;
            border: none;
            color: #C3C3C3;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s ease;
            font-family: inherit;
            padding: 0;
        }
        .dropbtn:hover {
            opacity: 0.7;
            text-decoration: underline;
        }
        .dropdown-icon svg path {
            stroke: #C3C3C3;
        }
        .dropdown-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 20px;
            height: 20px;
            margin-left: 6px;
        }
        .dropdown-icon svg {
            display: block;
            transition: all 0.2s ease;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: rgba(255, 255, 255, 0.5);
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 3;
            border-radius: 4px;
            margin-top: 8px;
            backdrop-filter: blur(0px);
        }
        .dropdown-content.show {
            display: block;
        }
        .dropdown-content a {
            color: #4a4a4a;
            padding: 10px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }
        .dropdown-content a:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }
        .dropdown-content .placeholder-item {
            color: #4a4a4a;
            padding: 10px 16px;
            display: block;
            font-size: 14px;
            pointer-events: none;
            background-color: transparent;
            min-height: 36px;
            text-align: left;
        }
        .dropdown-control {
            display: flex;
            align-items: center;
        }
        svg {
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="background-cover"></div>
    <div class="top-bar">
        <!-- 点击左侧区域（logo + Potatos标题）跳转到 index.html -->
        <div class="left-section" onclick="location.href='index.html';">
            <img class="logo" src="resource/logo.png" alt="logo">
            <span class="brand-name">Potatos</span>
        </div>
        <div class="right-section">
            <a class="nav-link" href="about.html" target="_self">关于本站</a>
            <div class="dropdown" id="projectDropdown">
                <div class="dropdown-control">
                    <button class="dropbtn" id="dropdownButtonText">项目</button>
                    <span class="dropdown-icon" id="dropdownIcon">
                        <svg id="iconLeft" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15 18L9 12L15 6" stroke="#C3C3C3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <svg id="iconDown" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: none;">
                            <path d="M6 9L12 15L18 9" stroke="#C3C3C3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>
                <div class="dropdown-content" id="dropdownContent">
                    <a href="#">PotatoCPPApp</a>
                    <div class="placeholder-item">空</div>
                    <div class="placeholder-item">空</div>
                </div>
            </div>
            <!-- 搜索框放在最右边 -->
            <div class="search-box">
                <span class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 15.5L19 19M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="rgba(255, 255, 255, 0.8)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <input type="text" class="search-input" placeholder="搜索...">
            </div>
        </div>
    </div>

    <script>
        (function() {
            const dropdownContainer = document.getElementById('projectDropdown');
            const dropdownContent = document.getElementById('dropdownContent');
            const iconLeft = document.getElementById('iconLeft');
            const iconDown = document.getElementById('iconDown');
            const iconWrapper = document.getElementById('dropdownIcon');
            const dropdownTextBtn = document.getElementById('dropdownButtonText');
            
            let isMenuOpen = false;
            
            function updateIcon() {
                if (isMenuOpen) {
                    if (iconLeft) iconLeft.style.display = 'none';
                    if (iconDown) iconDown.style.display = 'block';
                } else {
                    if (iconLeft) iconLeft.style.display = 'block';
                    if (iconDown) iconDown.style.display = 'none';
                }
            }
            
            function openMenu() {
                if (!isMenuOpen) {
                    isMenuOpen = true;
                    if (dropdownContent) dropdownContent.classList.add('show');
                    updateIcon();
                }
            }
            
            function closeMenu() {
                if (isMenuOpen) {
                    isMenuOpen = false;
                    if (dropdownContent) dropdownContent.classList.remove('show');
                    updateIcon();
                }
            }
            
            function toggleMenu() {
                if (isMenuOpen) {
                    closeMenu();
                } else {
                    openMenu();
                }
            }
            
            if (iconWrapper) {
                iconWrapper.addEventListener('click', function(event) {
                    event.stopPropagation();
                    toggleMenu();
                });
            }
            
            if (dropdownTextBtn) {
                dropdownTextBtn.addEventListener('click', function(event) {
                    event.stopPropagation();
                    toggleMenu();
                });
            }
            
            if (dropdownContent) {
                dropdownContent.addEventListener('click', function(event) {
                    event.stopPropagation();
                });
            }
            
            document.addEventListener('click', function(event) {
                if (dropdownContainer && !dropdownContainer.contains(event.target)) {
                    closeMenu();
                }
            });
            
            isMenuOpen = false;
            updateIcon();
            if (dropdownContent) dropdownContent.classList.remove('show');
            
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape' && isMenuOpen) {
                    closeMenu();
                }
            });
        })();
    </script>
</body>
</html>
