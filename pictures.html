<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画廊 | Potatos.</title>
    <link rel="icon" type="image/png" href="resource/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        .bg-cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('resource/pictures_background.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(136, 136, 136, 0.35);
            backdrop-filter: blur(12px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 70px;
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }

        .logo {
            height: 48px;
        }

        .brand-name {
            color: white;
            font-size: 28px;
            font-weight: normal;
        }

        .right-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-link {
            color: #C3C3C3;
            text-decoration: none;
            font-size: 14px;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 140px;
        }

        .gallery-section {
            position: relative;
            z-index: 2;
            padding: 100px 5% 60px;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .gallery-header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #FFF, #FFE6B0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .gallery-card {
            background: rgba(20, 24, 38, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .gallery-card:hover {
            transform: translateY(-4px);
            border-color: #FFD966;
        }

        .card-line {
            height: 6px;
            background: linear-gradient(90deg, #FFD966, #F4B942);
        }

        .gallery-img {
            width: 100%;
            display: block;
            background: #0f0f1a;
        }

        .gallery-info {
            padding: 14px;
        }

        .gallery-date {
            color: #FFE0A0;
            font-size: 0.8rem;
        }

        .gallery-name {
            color: #aaa;
            font-size: 0.7rem;
            margin-top: 6px;
            word-break: break-word;
        }

        .empty-state, .loading-area {
            text-align: center;
            padding: 60px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 40px;
            color: #ddd;
        }

        .modal-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 20px;
        }

        @media (max-width: 700px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="bg-cover"></div>

<div class="top-bar">
    <div class="left-section" onclick="location.href='index.html';">
        <img class="logo" src="resource/logo.png" alt="logo">
        <span class="brand-name">Potatos</span>
    </div>
    <div class="right-section">
        <a class="nav-link" href="about.html">关于本站</a>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="gallerySearchInput" class="search-input" placeholder="搜索...">
        </div>
    </div>
</div>

<div class="gallery-section">
    <div class="gallery-container">
        <div class="gallery-header">
            <h1>🖼️ 赛博画廊</h1>
            <p>记录瞬间 · 分享视角</p>
        </div>
        <div id="galleryGrid" class="gallery-grid">
            <div class="loading-area">📡 加载图片中…</div>
        </div>
    </div>
</div>

<script>
    (function() {
        const grid = document.getElementById('galleryGrid');

        async function loadGallery() {
            try {
                // 1️⃣ 拉取 index.json
                const res = await fetch('pictures/index.json?t=' + Date.now());
                if (!res.ok) throw new Error('index.json 不存在');
                const list = await res.json();

                if (!list.length) {
                    grid.innerHTML = `<div class="empty-state">🖼️ 暂无图片<br><span style="font-size:0.85rem;">请通过 admin/pictures_manage.html 添加</span></div>`;
                    return;
                }

                // 2️⃣ 直接渲染（不 HEAD 验证，避免 GitHub Pages 限制）
                let html = '';
                for (let item of list) {
                    const name = item.name;
                    const date = item.date || '未知日期';
                    const imgUrl = `pictures/${encodeURIComponent(name)}`;

                    html += `
                        <div class="gallery-card" onclick="showImage('${imgUrl.replace(/'/g, "\\'")}')">
                            <div class="card-line"></div>
                            <img class="gallery-img" src="${imgUrl}" loading="lazy" alt="${escapeHtml(name)}">
                            <div class="gallery-info">
                                <div class="gallery-date">📅 ${escapeHtml(date)}</div>
                                <div class="gallery-name">${escapeHtml(name)}</div>
                            </div>
                        </div>
                    `;
                }

                grid.innerHTML = html;
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div class="empty-state">❌ 加载失败<br><span>请确认 pictures/index.json 存在且格式正确</span></div>`;
            }
        }

        window.showImage = (url) => {
            const modal = document.createElement('div');
            modal.className = 'modal-full';
            modal.innerHTML = `<img class="modal-img" src="${url}" onclick="this.parentElement.remove()">`;
            document.body.appendChild(modal);
            modal.onclick = () => modal.remove();
        };

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        // 搜索跳转
        document.getElementById('gallerySearchInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const kw = e.target.value.trim();
                window.open(kw ? `search.html?q=${encodeURIComponent(kw)}` : 'search.html', '_blank');
            }
        });

        loadGallery();
    })();
</script>
</body>
</html>
