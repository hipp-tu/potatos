<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potatos 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
        }
        h3 { color: #FFE6B0; margin-bottom: 16px; }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: white;
        }
        textarea { min-height: 140px; }
        button {
            padding: 10px 24px;
            background: #FFD966;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        button.danger { background: #dc3545; color: white; }
        .item-list { display: flex; flex-direction: column; gap: 12px; max-height: 420px; overflow-y: auto; }
        .list-item {
            background: rgba(255,255,255,0.05);
            padding: 14px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status {
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }
        .status.success { background: rgba(40,167,69,0.3); color: #90EE90; display: block; }
        .status.error { background: rgba(220,53,69,0.3); color: #FF8888; display: block; }
        .status.loading { background: rgba(255,217,102,0.3); color: #FFE6B0; display: block; }
        .user-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-content: space-between;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.08);
            padding: 12px 24px;
            border-radius: 60px;
        }
        .github-login-btn {
            background: #2c3e50;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="card" id="loginPanel">
        <h3>🔐 管理员登录</h3>
        <a id="githubLoginBtn" class="github-login-btn">
            🔑 使用 GitHub 账号登录
        </a>
        <div id="loginError" style="margin-top: 16px; color: #ff8888;"></div>
    </div>

    <div id="adminPanel" style="display: none;">
        <div class="user-bar">
            <span>✅ 管理员：<strong id="adminName"></strong></span>
            <button onclick="logout()">退出登录</button>
        </div>

        <div class="card">
            <h3>📝 添加博客</h3>
            <input type="text" id="blogTitle" placeholder="标题">
            <select id="blogType">
                <option>技术笔记</option><option>日志</option><option>AI探索</option><option>赛博日志</option>
            </select>
            <input type="text" id="blogTags" placeholder="标签 (逗号分隔)">
            <textarea id="blogBody" placeholder="正文 (支持HTML)"></textarea>
            <input type="text" id="blogSummary" placeholder="摘要">
            <button onclick="addBlog()">✨ 添加博客</button>
        </div>

        <div class="card">
            <h3>🔔 添加通知</h3>
            <input type="text" id="noticeTitle" placeholder="标题">
            <input type="text" id="noticeIcon" placeholder="图标 (🎉)">
            <textarea id="noticeContent" placeholder="内容"></textarea>
            <input type="text" id="noticeSummary" placeholder="摘要">
            <button onclick="addNotice()">➕ 添加通知</button>
        </div>

        <div class="card"><h3>📖 博客列表</h3><div id="blogList">加载中…</div></div>
        <div class="card"><h3>📋 通知列表</h3><div id="noticeList">加载中…</div></div>
    </div>

    <div id="statusMsg" class="status"></div>
</div>

<script>
    // ======== 配置 ========
    const GITHUB_CLIENT_ID = "Ov23li8c3G9b35PI7yYu";
    const REDIRECT_URI = window.location.href.split('?')[0];
    const REPO_OWNER = "hipp-tu";
    const REPO_NAME = "potatos";

    let oauthAccessToken = null;
    let currentUser = null;
    let blogs = [];
    let notices = [];

    function showStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.className = `status ${type}`;
        el.innerText = msg;
        setTimeout(() => el.className = 'status', 3000);
    }

    // 获取 URL 参数
    function getUrlParam(name) {
        return new URLSearchParams(window.location.search).get(name);
    }

    // 用 code 换取 access_token（纯前端 + CORS 代理）
    async function exchangeCodeForToken(code) {
        const proxy = "https://cors-anywhere.herokuapp.com/";
        const url = `https://github.com/login/oauth/access_token`;
        const res = await fetch(proxy + url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                client_id: GITHUB_CLIENT_ID,
                client_secret: "",   // 注意：纯前端不能放 secret
                code: code
            })
        });
        const text = await res.text();
        const params = new URLSearchParams(text);
        return params.get('access_token');
    }

    // 用 token 获取用户信息
    async function fetchUser(token) {
        const res = await fetch('https://api.github.com/user', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Auth fail');
        return await res.json();
    }

    // 从 GitHub 读 JSON
    async function readRaw(path) {
        const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${path}`;
        const res = await fetch(url);
        if (!res.ok) return null;
        return await res.json();
    }

    // 写文件到 GitHub（使用 OAuth token）
    async function writeToGitHub(path, data) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
        let sha = "";
        try {
            const getRes = await fetch(url, {
                headers: { 'Authorization': `Bearer ${oauthAccessToken}` }
            });
            if (getRes.ok) {
                const file = await getRes.json();
                sha = file.sha;
            }
        } catch(e) {}

        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        const putRes = await fetch(url, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${oauthAccessToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: `Update ${path} from admin`,
                content: content,
                sha: sha
            })
        });
        return putRes.ok;
    }

    // 加载数据
    async function loadData() {
        const [blogsRaw, noticesRaw] = await Promise.all([
            readRaw('resource/blogs.json'),
            readRaw('resource/notices.json')
        ]);
        if (blogsRaw) blogs = blogsRaw;
        if (noticesRaw) notices = noticesRaw;
        renderBlogs();
        renderNotices();
    }

    async function addBlog() {
        const newBlog = {
            type: document.getElementById('blogType').value,
            tags: document.getElementById('blogTags').value.split(',').map(t=>t.trim()),
            title: document.getElementById('blogTitle').value,
            cover: "resource/blog_cover.png",
            body: document.getElementById('blogBody').value,
            summary: document.getElementById('blogSummary').value
        };
        if (!newBlog.title || !newBlog.body) return alert("标题和正文不能为空");
        blogs.push(newBlog);
        const ok = await writeToGitHub('resource/blogs.json', blogs);
        if (ok) {
            showStatus("博客已添加", "success");
            renderBlogs();
            document.getElementById('blogTitle').value = "";
            document.getElementById('blogTags').value = "";
            document.getElementById('blogBody').value = "";
        } else showStatus("推送失败，请检查授权", "error");
    }

    async function deleteBlog(idx) {
        if (!confirm(`删除「${blogs[idx].title}」？`)) return;
        blogs.splice(idx, 1);
        const ok = await writeToGitHub('resource/blogs.json', blogs);
        if (ok) { showStatus("已删除", "success"); renderBlogs(); }
        else showStatus("删除失败", "error");
    }

    async function addNotice() {
        const newNotice = {
            id: Date.now(),
            title: document.getElementById('noticeTitle').value,
            icon: document.getElementById('noticeIcon').value || "🔔",
            date: new Date().toISOString().slice(0,10),
            summary: document.getElementById('noticeSummary').value,
            content: document.getElementById('noticeContent').value
        };
        if (!newNotice.title) return alert("标题不能为空");
        notices.push(newNotice);
        const ok = await writeToGitHub('resource/notices.json', notices);
        if (ok) {
            showStatus("通知已添加", "success");
            renderNotices();
            document.getElementById('noticeTitle').value = "";
            document.getElementById('noticeContent').value = "";
        } else showStatus("推送失败", "error");
    }

    async function deleteNotice(idx) {
        if (!confirm(`删除「${notices[idx].title}」？`)) return;
        notices.splice(idx, 1);
        const ok = await writeToGitHub('resource/notices.json', notices);
        if (ok) { showStatus("已删除", "success"); renderNotices(); }
        else showStatus("删除失败", "error");
    }

    function renderBlogs() {
        const div = document.getElementById('blogList');
        if (!blogs.length) { div.innerHTML = "暂无博客"; return; }
        div.innerHTML = blogs.map((b,i)=>`
            <div class="list-item">
                <div><strong>${escapeHtml(b.title)}</strong><br><small>${b.type}</small></div>
                <button class="danger" onclick="deleteBlog(${i})">删除</button>
            </div>
        `).join('');
    }

    function renderNotices() {
        const div = document.getElementById('noticeList');
        if (!notices.length) { div.innerHTML = "暂无通知"; return; }
        div.innerHTML = notices.map((n,i)=>`
            <div class="list-item">
                <div>${escapeHtml(n.icon)} ${escapeHtml(n.title)}<br><small>${n.date}</small></div>
                <button class="danger" onclick="deleteNotice(${i})">删除</button>
            </div>
        `).join('');
    }

    function escapeHtml(s) { return s?.replace(/[&<>]/g, t=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[t])) || ""; }

    async function loginWithCode(code) {
        showStatus("登录中…", "loading");
        const token = await exchangeCodeForToken(code);
        if (!token) {
            document.getElementById('loginError').innerText = "登录失败，无法获取 token";
            return;
        }
        const user = await fetchUser(token);
        if (!user || user.login !== "hipp-tu") {
            document.getElementById('loginError').innerText = "你没有管理员权限";
            return;
        }
        oauthAccessToken = token;
        currentUser = user;
        localStorage.setItem('admin_token', token);
        localStorage.setItem('admin_user', user.login);
        window.history.replaceState({}, '', window.location.pathname);
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminName').innerText = user.login;
        await loadData();
    }

    function logout() {
        localStorage.removeItem('admin_token');
        localStorage.removeItem('admin_user');
        oauthAccessToken = null;
        location.reload();
    }

    function init() {
        const code = getUrlParam('code');
        const savedToken = localStorage.getItem('admin_token');
        if (code) {
            loginWithCode(code);
        } else if (savedToken) {
            oauthAccessToken = savedToken;
            fetchUser(savedToken).then(user => {
                if (user?.login === "hipp-tu") {
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    document.getElementById('adminName').innerText = user.login;
                    loadData();
                } else {
                    logout();
                }
            }).catch(() => logout());
        } else {
            const loginUrl = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${REDIRECT_URI}`;
            document.getElementById('githubLoginBtn').href = loginUrl;
        }
    }

    init();
</script>
</body>
</html>
