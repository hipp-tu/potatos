<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potatos 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
        }
        h3 { color: #FFE6B0; margin-bottom: 16px; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: white;
        }
        button {
            padding: 10px 24px;
            background: #FFD966;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        button.danger { background: #dc3545; color: white; }
        .item-list { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; }
        .list-item {
            background: rgba(255,255,255,0.05);
            padding: 14px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status {
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }
        .status.success { background: rgba(40,167,69,0.3); color: #90EE90; display: block; }
        .status.error { background: rgba(220,53,69,0.3); color: #FF8888; display: block; }
        .github-login-btn {
            background: #2c3e50;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
            margin-top: 16px;
        }
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.08);
            padding: 12px 24px;
            border-radius: 60px;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="card" id="loginPanel">
        <h3>🔐 管理员身份验证</h3>
        <p style="color: #ccc;">使用 GitHub 账号登录（仅限授权用户）</p>
        <a id="githubLoginBtn" class="github-login-btn">🔑 使用 GitHub 登录</a>
        <div id="loginError" style="margin-top: 16px; color: #ff8888;"></div>
    </div>

    <div id="adminPanel" style="display: none;">
        <div class="user-bar">
            <span>✅ 管理员：<strong id="adminName"></strong></span>
            <button onclick="logout()">退出登录</button>
        </div>

        <div class="card">
            <h3>📝 添加博客</h3>
            <input type="text" id="blogTitle" placeholder="标题">
            <select id="blogType">
                <option>技术笔记</option><option>日志</option><option>AI探索</option><option>赛博日志</option>
            </select>
            <input type="text" id="blogTags" placeholder="标签 (逗号分隔)">
            <textarea id="blogBody" placeholder="正文 (支持HTML)"></textarea>
            <input type="text" id="blogSummary" placeholder="摘要">
            <button onclick="addBlog()">✨ 添加博客</button>
        </div>

        <div class="card">
            <h3>🔔 添加通知</h3>
            <input type="text" id="noticeTitle" placeholder="标题">
            <input type="text" id="noticeIcon" placeholder="图标 (🎉)">
            <textarea id="noticeContent" placeholder="内容"></textarea>
            <input type="text" id="noticeSummary" placeholder="摘要">
            <button onclick="addNotice()">➕ 添加通知</button>
        </div>

        <div class="card"><h3>📖 博客列表</h3><div id="blogList">加载中…</div></div>
        <div class="card"><h3>📋 通知列表</h3><div id="noticeList">加载中…</div></div>
    </div>

    <div id="statusMsg" class="status"></div>
</div>

<script>
    // ======== 配置 ========
    const GITHUB_CLIENT_ID = "Ov23li8c3G9b35PI7yYu";   // ← 改成你的
    const REDIRECT_URI = window.location.href.split('?')[0];
    const REPO_OWNER = "hipp-tu";
    const REPO_NAME = "potatos";

    let githubOAuthToken = null;
    let currentUser = null;
    let blogs = [];
    let notices = [];

    function showStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.className = `status ${type}`;
        el.innerText = msg;
        setTimeout(() => el.className = 'status', 3000);
    }

    // 重点：纯前端 OAuth（不使用client_secret）
    async function getGitHubTokenFromCode(code) {
        const proxy = "https://cors-anywhere.herokuapp.com/";
        const res = await fetch(proxy + "https://github.com/login/oauth/access_token", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                client_id: GITHUB_CLIENT_ID,
                client_secret: "",   // 不需要，但 GitHub 仍会返回 token（限制为公开资源）
                code: code
            })
        });
        const text = await res.text();
        return new URLSearchParams(text).get('access_token');
    }

    async function loadData() {
        try {
            const [blogsRaw, noticesRaw] = await Promise.all([
                fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/resource/blogs.json`).then(r=>r.json()),
                fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/resource/notices.json`).then(r=>r.json())
            ]);
            blogs = blogsRaw;
            notices = noticesRaw;
            renderBlogs();
            renderNotices();
        } catch(e) { console.warn(e); }
    }

    async function writeToGitHub(path, data) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
        let sha = "";
        try {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${githubOAuthToken}` } });
            if (res.ok) sha = (await res.json()).sha;
        } catch(e) {}

        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        const put = await fetch(url, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${githubOAuthToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message: `Update ${path}`, content, sha })
        });
        return put.ok;
    }

    async function addBlog() {
        const newBlog = {
            type: document.getElementById('blogType').value,
            tags: document.getElementById('blogTags').value.split(',').map(t=>t.trim()),
            title: document.getElementById('blogTitle').value,
            cover: "resource/blog_cover.png",
            body: document.getElementById('blogBody').value,
            summary: document.getElementById('blogSummary').value
        };
        if (!newBlog.title || !newBlog.body) return alert("标题和正文不能为空");
        blogs.push(newBlog);
        if (await writeToGitHub('resource/blogs.json', blogs)) {
            showStatus("博客已添加", "success");
            renderBlogs();
            document.getElementById('blogTitle').value = "";
            document.getElementById('blogTags').value = "";
            document.getElementById('blogBody').value = "";
        } else showStatus("推送失败", "error");
    }

    async function deleteBlog(idx) {
        if (!confirm(`删除「${blogs[idx].title}」？`)) return;
        blogs.splice(idx, 1);
        if (await writeToGitHub('resource/blogs.json', blogs)) {
            showStatus("已删除", "success");
            renderBlogs();
        } else showStatus("删除失败", "error");
    }

    async function addNotice() {
        const newNotice = {
            id: Date.now(),
            title: document.getElementById('noticeTitle').value,
            icon: document.getElementById('noticeIcon').value || "🔔",
            date: new Date().toISOString().slice(0,10),
            summary: document.getElementById('noticeSummary').value,
            content: document.getElementById('noticeContent').value
        };
        if (!newNotice.title) return alert("标题不能为空");
        notices.push(newNotice);
        if (await writeToGitHub('resource/notices.json', notices)) {
            showStatus("通知已添加", "success");
            renderNotices();
            document.getElementById('noticeTitle').value = "";
            document.getElementById('noticeContent').value = "";
        } else showStatus("推送失败", "error");
    }

    async function deleteNotice(idx) {
        if (!confirm(`删除「${notices[idx].title}」？`)) return;
        notices.splice(idx, 1);
        if (await writeToGitHub('resource/notices.json', notices)) {
            showStatus("已删除", "success");
            renderNotices();
        } else showStatus("删除失败", "error");
    }

    function renderBlogs() {
        const div = document.getElementById('blogList');
        if (!blogs.length) { div.innerHTML = "暂无博客"; return; }
        div.innerHTML = blogs.map((b,i)=>`
            <div class="list-item">
                <div><strong>${escapeHtml(b.title)}</strong><br><small>${b.type}</small></div>
                <button class="danger" onclick="deleteBlog(${i})">删除</button>
            </div>
        `).join('');
    }

    function renderNotices() {
        const div = document.getElementById('noticeList');
        if (!notices.length) { div.innerHTML = "暂无通知"; return; }
        div.innerHTML = notices.map((n,i)=>`
            <div class="list-item">
                <div>${escapeHtml(n.icon)} ${escapeHtml(n.title)}<br><small>${n.date}</small></div>
                <button class="danger" onclick="deleteNotice(${i})">删除</button>
            </div>
        `).join('');
    }

    function escapeHtml(s) { return s?.replace(/[&<>]/g, t=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[t])) || ""; }

    async function handleOAuth() {
        const code = new URLSearchParams(window.location.search).get('code');
        if (!code) return;

        const token = await getGitHubTokenFromCode(code);
        if (!token) return;

        const userRes = await fetch('https://api.github.com/user', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const user = await userRes.json();
        if (user.login !== "hipp-tu") {
            document.getElementById('loginError').innerText = "你没有管理员权限";
            return;
        }

        githubOAuthToken = token;
        currentUser = user;
        localStorage.setItem('admin_token', token);
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminName').innerText = user.login;
        window.history.replaceState({}, '', window.location.pathname);
        await loadData();
    }

    function logout() {
        localStorage.removeItem('admin_token');
        location.reload();
    }

    function init() {
        const savedToken = localStorage.getItem('admin_token');
        if (savedToken) {
            githubOAuthToken = savedToken;
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminName').innerText = "管理员";
            loadData();
            return;
        }
        handleOAuth();
        const loginUrl = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${REDIRECT_URI}`;
        document.getElementById('githubLoginBtn').href = loginUrl;
    }

    init();
</script>
</body>
</html>
