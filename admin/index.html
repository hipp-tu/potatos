<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Potatos. - 管理页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: url('../resource/admin_background.png') no-repeat center center fixed;
            background-size: cover;
            padding: 24px;
            position: relative;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        .admin-wrapper {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.92);
            margin-bottom: 32px;
            border-radius: 28px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand img {
            height: 48px;
            width: auto;
        }

        .brand h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #c2410c, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f1f5f9;
            padding: 6px 20px;
            border-radius: 60px;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #dc2626;
            font-weight: 500;
            cursor: pointer;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 28px;
            margin-bottom: 32px;
        }

        .oa-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            border-left: 5px solid #f59e0b;
            padding-left: 16px;
            margin-bottom: 20px;
            color: #0f172a;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }

        button {
            background: #f59e0b;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button.danger {
            background: #ef4444;
        }

        .item-list {
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .list-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eef2ff;
        }

        .login-container {
            max-width: 460px;
            margin: 100px auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            padding: 40px 32px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 1rem;
        }

        .login-btn {
            background: #24292e;
            width: 100%;
            justify-content: center;
        }

        .status-msg {
            margin-top: 16px;
            padding: 10px;
            border-radius: 30px;
            display: none;
        }

        @media (max-width: 760px) {
            body { padding: 16px; }
            .admin-header { flex-direction: column; gap: 12px; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="admin-wrapper">
    <!-- 登录界面 -->
    <div id="loginPanel" class="login-container">
        <img src="../resource/admin.png" alt="admin" style="width: 80px; margin-bottom: 16px;">
        <h2>Potatos 管理中枢</h2>
        <p style="margin: 8px 0 16px; color: #475569;">请输入管理密码</p>
        <div class="login-box">
            <input type="password" id="passwordInput" placeholder="密码" autocomplete="off">
            <button id="loginBtn" class="login-btn">🔐 登录</button>
            <div id="loginErrorMsg" style="color:#b91c1c; margin-top: 16px;"></div>
        </div>
    </div>

    <!-- 管理界面 -->
    <div id="adminApp" style="display: none;">
        <div class="admin-header">
            <div class="brand">
                <img src="../resource/admin.png" alt="logo">
                <h1>Potatos · 赛博实验室</h1>
            </div>
            <div class="user-area">
                <span>管理员</span>
                <button id="logoutBtn" class="logout-btn">退出</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="oa-card">
                <div class="card-title">📝 发布博客</div>
                <input type="text" id="blogTitle" placeholder="标题 *">
                <select id="blogType">
                    <option value="技术笔记">技术笔记</option>
                    <option value="日志">日志</option>
                    <option value="AI探索">AI探索</option>
                    <option value="赛博日志">赛博日志</option>
                </select>
                <input type="text" id="blogTags" placeholder="标签 (逗号分隔)">
                <textarea id="blogBody" rows="5" placeholder="正文 (HTML)"></textarea>
                <input type="text" id="blogSummary" placeholder="摘要">
                <button id="addBlogBtn">✨ 立即发布</button>
            </div>

            <div class="oa-card">
                <div class="card-title">🔔 站务通知</div>
                <input type="text" id="noticeTitle" placeholder="通知标题">
                <input type="text" id="noticeIcon" placeholder="图标 (🎉)">
                <textarea id="noticeContent" rows="4" placeholder="通知内容"></textarea>
                <input type="text" id="noticeSummary" placeholder="摘要">
                <button id="addNoticeBtn">➕ 推送通知</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="oa-card">
                <div class="card-title">📚 已有博客</div>
                <div id="blogListContainer" class="item-list">加载中…</div>
            </div>
            <div class="oa-card">
                <div class="card-title">📢 已有通知</div>
                <div id="noticeListContainer" class="item-list">加载中…</div>
            </div>
        </div>
    </div>
    <div id="globalStatus" class="status-msg"></div>
</div>

<script>
    // ================= 密码哈希验证（防君子不防小人） =================
    // 密码 "hipp_tu114514" 的 SHA-256 哈希值
    const PASSWORD_HASH = "b087017cc9269f477ba6954969cd68a96c8521541c961c30bf99c2804dbb94a9";
    
    // 实测密码 "hipp_tu114514" 的 SHA256 哈希值（预计算）
    // 你也可以用这个在线工具验证：https://emn178.github.io/online-tools/sha256.html
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // GitHub API 配置
    const REPO_OWNER = "hipp-tu";
    const REPO_NAME = "potatos";
    let githubToken = null;
    let blogsData = [];
    let noticesData = [];

    const loginPanel = document.getElementById('loginPanel');
    const adminApp = document.getElementById('adminApp');
    const loginErrorMsg = document.getElementById('loginErrorMsg');
    const globalStatus = document.getElementById('globalStatus');

    function showMessage(msg, isError = false) {
        globalStatus.innerText = msg;
        globalStatus.style.background = isError ? '#fee2e2' : '#dcfce7';
        globalStatus.style.color = isError ? '#b91c1c' : '#166534';
        globalStatus.style.display = 'block';
        setTimeout(() => globalStatus.style.display = 'none', 3000);
    }

    // 登录验证
    async function login() {
        const password = document.getElementById('passwordInput').value;
        if (!password) {
            loginErrorMsg.innerText = '请输入密码';
            return;
        }
        const hash = await hashPassword(password);
        if (hash === PASSWORD_HASH) {
            // 密码正确，进入后台
            loginPanel.style.display = 'none';
            adminApp.style.display = 'block';
            loadAllData();
            // 可选：保存登录状态到 session（刷新页面会失效，更安全）
            sessionStorage.setItem('admin_logged_in', 'true');
        } else {
            loginErrorMsg.innerText = '密码错误';
        }
    }

    // 检查登录状态
    function checkAuth() {
        if (sessionStorage.getItem('admin_logged_in') === 'true') {
            loginPanel.style.display = 'none';
            adminApp.style.display = 'block';
            loadAllData();
        }
    }

    function logout() {
        sessionStorage.removeItem('admin_logged_in');
        loginPanel.style.display = 'block';
        adminApp.style.display = 'none';
        document.getElementById('passwordInput').value = '';
    }

    // GitHub 操作（复用之前的逻辑，但需要用户先配置 Token）
    async function fetchWithToken(path) {
        // 首次进入时要求输入 Token（一次性）
        if (!githubToken) {
            githubToken = prompt('请输入 GitHub Personal Access Token (需要 repo 权限)\n生成地址: https://github.com/settings/tokens');
            if (!githubToken) return null;
        }
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${githubToken}` } });
        if (!res.ok) return null;
        const data = await res.json();
        return JSON.parse(atob(data.content));
    }

    async function writeWithToken(path, contentData) {
        if (!githubToken) {
            githubToken = prompt('请输入 GitHub Token');
            if (!githubToken) return false;
        }
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
        let sha = '';
        try {
            const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${githubToken}` } });
            if (getRes.ok) sha = (await getRes.json()).sha;
        } catch(e) {}
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(contentData, null, 2))));
        const putRes = await fetch(url, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${githubToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message: `admin 更新 ${path}`, content, sha })
        });
        return putRes.ok;
    }

    async function loadAllData() {
        try {
            const blogsRaw = await fetchWithToken('resource/blogs.json');
            const noticesRaw = await fetchWithToken('resource/notices.json');
            if (blogsRaw) blogsData = blogsRaw;
            if (noticesRaw) noticesData = noticesRaw;
            renderBlogs();
            renderNotices();
        } catch (e) {
            showMessage('加载失败，请检查 Token', true);
        }
    }

    function renderBlogs() {
        const container = document.getElementById('blogListContainer');
        if (!blogsData.length) { container.innerHTML = '<div style="color:#64748b;">暂无博客</div>'; return; }
        container.innerHTML = blogsData.map((blog, idx) => `
            <div class="list-item">
                <div><strong>${escapeHtml(blog.title)}</strong><br><small>${blog.type}</small></div>
                <button class="danger" data-blog-index="${idx}" style="padding:6px 14px;">删除</button>
            </div>
        `).join('');
    }

    function renderNotices() {
        const container = document.getElementById('noticeListContainer');
        if (!noticesData.length) { container.innerHTML = '<div style="color:#64748b;">暂无通知</div>'; return; }
        container.innerHTML = noticesData.map((notice, idx) => `
            <div class="list-item">
                <div>${escapeHtml(notice.icon || '🔔')} ${escapeHtml(notice.title)}<br><small>${notice.date}</small></div>
                <button class="danger" data-notice-index="${idx}" style="padding:6px 14px;">删除</button>
            </div>
        `).join('');
    }

    document.addEventListener('click', async (e) => {
        const blogBtn = e.target.closest('[data-blog-index]');
        if (blogBtn) {
            const idx = parseInt(blogBtn.dataset.blogIndex);
            if (confirm(`删除「${blogsData[idx].title}」？`)) {
                blogsData.splice(idx, 1);
                if (await writeWithToken('resource/blogs.json', blogsData)) {
                    renderBlogs();
                    showMessage('已删除');
                } else showMessage('删除失败', true);
            }
            return;
        }
        const noticeBtn = e.target.closest('[data-notice-index]');
        if (noticeBtn) {
            const idx = parseInt(noticeBtn.dataset.noticeIndex);
            if (confirm(`删除「${noticesData[idx].title}」？`)) {
                noticesData.splice(idx, 1);
                if (await writeWithToken('resource/notices.json', noticesData)) {
                    renderNotices();
                    showMessage('通知已删除');
                } else showMessage('删除失败', true);
            }
        }
    });

    async function addBlog() {
        const title = document.getElementById('blogTitle').value.trim();
        const body = document.getElementById('blogBody').value.trim();
        if (!title || !body) { showMessage('标题和正文不能为空', true); return; }
        const newBlog = {
            type: document.getElementById('blogType').value,
            tags: document.getElementById('blogTags').value.split(',').map(t=>t.trim()).filter(t=>t),
            title,
            cover: "../resource/blog_cover.png",
            body,
            summary: document.getElementById('blogSummary').value
        };
        blogsData.push(newBlog);
        if (await writeWithToken('resource/blogs.json', blogsData)) {
            showMessage('博客发布成功');
            document.getElementById('blogTitle').value = '';
            document.getElementById('blogTags').value = '';
            document.getElementById('blogBody').value = '';
            document.getElementById('blogSummary').value = '';
            renderBlogs();
        } else showMessage('发布失败', true);
    }

    async function addNotice() {
        const title = document.getElementById('noticeTitle').value.trim();
        if (!title) { showMessage('标题不能为空', true); return; }
        const newNotice = {
            id: Date.now(),
            title,
            icon: document.getElementById('noticeIcon').value || '🔔',
            date: new Date().toISOString().slice(0,10),
            summary: document.getElementById('noticeSummary').value,
            content: document.getElementById('noticeContent').value
        };
        noticesData.push(newNotice);
        if (await writeWithToken('resource/notices.json', noticesData)) {
            showMessage('通知已添加');
            document.getElementById('noticeTitle').value = '';
            document.getElementById('noticeIcon').value = '';
            document.getElementById('noticeContent').value = '';
            document.getElementById('noticeSummary').value = '';
            renderNotices();
        } else showMessage('添加失败', true);
    }

    function escapeHtml(s) { return String(s || '').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    document.getElementById('loginBtn')?.addEventListener('click', login);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('addBlogBtn')?.addEventListener('click', addBlog);
    document.getElementById('addNoticeBtn')?.addEventListener('click', addNotice);
    document.getElementById('passwordInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });

    checkAuth();
</script>
</body>
</html>
