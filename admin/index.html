<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Potatos 管理中心 · 终章版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: url('../resource/admin_background.png') no-repeat center center fixed;
            background-size: cover;
            padding: 24px;
            position: relative;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        .admin-wrapper {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.92);
            margin-bottom: 32px;
            border-radius: 28px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand img {
            height: 48px;
            width: auto;
        }

        .brand h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #c2410c, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f1f5f9;
            padding: 6px 20px;
            border-radius: 60px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #f59e0b;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #dc2626;
            font-weight: 500;
            cursor: pointer;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 28px;
            margin-bottom: 32px;
        }

        .oa-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            border-left: 5px solid #f59e0b;
            padding-left: 16px;
            margin-bottom: 20px;
            color: #0f172a;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }

        button {
            background: #f59e0b;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button.danger {
            background: #ef4444;
        }

        .item-list {
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .list-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eef2ff;
        }

        .login-container {
            max-width: 460px;
            margin: 100px auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            padding: 40px 32px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .github-login-btn {
            background: #24292e;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .status-msg {
            margin-top: 16px;
            padding: 10px;
            border-radius: 30px;
            display: none;
        }

        @media (max-width: 760px) {
            body { padding: 16px; }
            .admin-header { flex-direction: column; gap: 12px; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="admin-wrapper">
    <div id="loginPanel" class="login-container">
        <img src="../resource/admin.png" alt="admin" style="width: 80px; margin-bottom: 16px;">
        <h2>Potatos 管理中枢</h2>
        <p style="margin: 8px 0 16px;">使用 GitHub 账号验证</p>
        <button id="popupLoginBtn" class="github-login-btn">🔑 新窗口登录 GitHub</button>
        <div id="loginErrorMsg" style="color:#b91c1c; margin-top: 20px;"></div>
    </div>

    <div id="adminApp" style="display: none;">
        <div class="admin-header">
            <div class="brand">
                <img src="../resource/admin.png" alt="logo">
                <h1>Potatos · 赛博实验室</h1>
            </div>
            <div class="user-area">
                <img id="userAvatar" class="user-avatar" src="" alt="avatar">
                <span id="userNameDisplay"></span>
                <button id="logoutBtn" class="logout-btn">退出</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="oa-card">
                <div class="card-title">📝 发布博客</div>
                <input type="text" id="blogTitle" placeholder="标题 *">
                <select id="blogType">
                    <option value="技术笔记">技术笔记</option>
                    <option value="日志">日志</option>
                    <option value="AI探索">AI探索</option>
                    <option value="赛博日志">赛博日志</option>
                </select>
                <input type="text" id="blogTags" placeholder="标签 (逗号分隔)">
                <textarea id="blogBody" rows="5" placeholder="正文 (HTML)"></textarea>
                <input type="text" id="blogSummary" placeholder="摘要">
                <button id="addBlogBtn">✨ 立即发布</button>
            </div>

            <div class="oa-card">
                <div class="card-title">🔔 站务通知</div>
                <input type="text" id="noticeTitle" placeholder="通知标题">
                <input type="text" id="noticeIcon" placeholder="图标 (🎉)">
                <textarea id="noticeContent" rows="4" placeholder="通知内容"></textarea>
                <input type="text" id="noticeSummary" placeholder="摘要">
                <button id="addNoticeBtn">➕ 推送通知</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="oa-card">
                <div class="card-title">📚 已有博客</div>
                <div id="blogListContainer" class="item-list">加载中…</div>
            </div>
            <div class="oa-card">
                <div class="card-title">📢 已有通知</div>
                <div id="noticeListContainer" class="item-list">加载中…</div>
            </div>
        </div>
    </div>
    <div id="globalStatus" class="status-msg"></div>
</div>

<script>
    // ================= 终章配置 =================
    const GITHUB_CLIENT_ID = "Ov23li8c3G9b35PI7yYu";
    const REDIRECT_URI = window.location.href.split('?')[0];
    const REPO_OWNER = "hipp-tu";
    const REPO_NAME = "potatos";
    const ALLOWED_USERS = ["hipp-tu"];

    let oauthToken = null;
    let currentUser = null;
    let blogsData = [];
    let noticesData = [];

    const loginPanel = document.getElementById('loginPanel');
    const adminApp = document.getElementById('adminApp');
    const loginErrorMsg = document.getElementById('loginErrorMsg');
    const globalStatus = document.getElementById('globalStatus');

    function showMessage(msg, isError = false) {
        globalStatus.innerText = msg;
        globalStatus.style.background = isError ? '#fee2e2' : '#dcfce7';
        globalStatus.style.color = isError ? '#b91c1c' : '#166534';
        globalStatus.style.display = 'block';
        setTimeout(() => globalStatus.style.display = 'none', 3000);
    }

    async function fetchJSON(path) {
        const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${path}`;
        const res = await fetch(url);
        return res.ok ? res.json() : null;
    }

    async function writeToRepo(path, data) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
        let sha = '';
        try {
            const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${oauthToken}` } });
            if (getRes.ok) sha = (await getRes.json()).sha;
        } catch(e) {}
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        const putRes = await fetch(url, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${oauthToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message: `admin 更新 ${path}`, content, sha })
        });
        return putRes.ok;
    }

    async function loadAllData() {
        const blogs = await fetchJSON('resource/blogs.json');
        const notices = await fetchJSON('resource/notices.json');
        if (blogs) blogsData = blogs;
        if (notices) noticesData = notices;
        renderBlogs();
        renderNotices();
    }

    function renderBlogs() {
        const container = document.getElementById('blogListContainer');
        if (!blogsData.length) { container.innerHTML = '<div style="color:#64748b;">暂无博客</div>'; return; }
        container.innerHTML = blogsData.map((blog, idx) => `
            <div class="list-item">
                <div><strong>${escapeHtml(blog.title)}</strong><br><small>${blog.type}</small></div>
                <button class="danger" data-blog-index="${idx}" style="padding:6px 14px;">删除</button>
            </div>
        `).join('');
    }

    function renderNotices() {
        const container = document.getElementById('noticeListContainer');
        if (!noticesData.length) { container.innerHTML = '<div style="color:#64748b;">暂无通知</div>'; return; }
        container.innerHTML = noticesData.map((notice, idx) => `
            <div class="list-item">
                <div>${escapeHtml(notice.icon || '🔔')} ${escapeHtml(notice.title)}<br><small>${notice.date}</small></div>
                <button class="danger" data-notice-index="${idx}" style="padding:6px 14px;">删除</button>
            </div>
        `).join('');
    }

    document.addEventListener('click', async (e) => {
        const blogBtn = e.target.closest('[data-blog-index]');
        if (blogBtn) {
            const idx = parseInt(blogBtn.dataset.blogIndex);
            if (confirm(`删除「${blogsData[idx].title}」？`)) {
                blogsData.splice(idx, 1);
                if (await writeToRepo('resource/blogs.json', blogsData)) {
                    renderBlogs();
                    showMessage('已删除');
                } else showMessage('删除失败', true);
            }
            return;
        }
        const noticeBtn = e.target.closest('[data-notice-index]');
        if (noticeBtn) {
            const idx = parseInt(noticeBtn.dataset.noticeIndex);
            if (confirm(`删除「${noticesData[idx].title}」？`)) {
                noticesData.splice(idx, 1);
                if (await writeToRepo('resource/notices.json', noticesData)) {
                    renderNotices();
                    showMessage('通知已删除');
                } else showMessage('删除失败', true);
            }
        }
    });

    async function addBlog() {
        const title = document.getElementById('blogTitle').value.trim();
        const body = document.getElementById('blogBody').value.trim();
        if (!title || !body) { showMessage('标题和正文不能为空', true); return; }
        const newBlog = {
            type: document.getElementById('blogType').value,
            tags: document.getElementById('blogTags').value.split(',').map(t=>t.trim()).filter(t=>t),
            title,
            cover: "../resource/blog_cover.png",
            body,
            summary: document.getElementById('blogSummary').value
        };
        blogsData.push(newBlog);
        if (await writeToRepo('resource/blogs.json', blogsData)) {
            showMessage('博客发布成功');
            document.getElementById('blogTitle').value = '';
            document.getElementById('blogTags').value = '';
            document.getElementById('blogBody').value = '';
            document.getElementById('blogSummary').value = '';
            renderBlogs();
        } else showMessage('发布失败', true);
    }

    async function addNotice() {
        const title = document.getElementById('noticeTitle').value.trim();
        if (!title) { showMessage('标题不能为空', true); return; }
        const newNotice = {
            id: Date.now(),
            title,
            icon: document.getElementById('noticeIcon').value || '🔔',
            date: new Date().toISOString().slice(0,10),
            summary: document.getElementById('noticeSummary').value,
            content: document.getElementById('noticeContent').value
        };
        noticesData.push(newNotice);
        if (await writeToRepo('resource/notices.json', noticesData)) {
            showMessage('通知已添加');
            document.getElementById('noticeTitle').value = '';
            document.getElementById('noticeIcon').value = '';
            document.getElementById('noticeContent').value = '';
            document.getElementById('noticeSummary').value = '';
            renderNotices();
        } else showMessage('添加失败', true);
    }

    function openOAuthPopup() {
        const authUrl = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${REDIRECT_URI}`;
        window.open(authUrl, 'githubAuth', 'width=800,height=600,left=200,top=100');
    }

    async function exchangeCode(code) {
        const res = await fetch("https://github.com/login/oauth/access_token", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                client_id: GITHUB_CLIENT_ID,
                client_secret: "",
                code: code
            })
        });
        const text = await res.text();
        return new URLSearchParams(text).get("access_token");
    }

    async function finishLogin(token) {
        const userRes = await fetch('https://api.github.com/user', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!userRes.ok) throw new Error('获取用户失败');
        const user = await userRes.json();
        if (!ALLOWED_USERS.includes(user.login)) {
            loginErrorMsg.innerText = `@${user.login} 没有管理权限`;
            return false;
        }
        oauthToken = token;
        currentUser = user;
        localStorage.setItem('admin_token', token);
        document.getElementById('userNameDisplay').innerText = user.login;
        document.getElementById('userAvatar').src = user.avatar_url || '../resource/admin.png';
        loginPanel.style.display = 'none';
        adminApp.style.display = 'block';
        await loadAllData();
        return true;
    }

    async function handlePopupCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        if (!code) return;
        window.history.replaceState({}, '', window.location.pathname);
        const token = await exchangeCode(code);
        if (!token) {
            loginErrorMsg.innerText = '授权失败，请重试';
            return;
        }
        await finishLogin(token);
    }

    function logout() {
        localStorage.removeItem('admin_token');
        window.location.replace(window.location.pathname);
    }

    async function init() {
        const savedToken = localStorage.getItem('admin_token');
        if (savedToken) {
            try {
                const userRes = await fetch('https://api.github.com/user', { headers: { 'Authorization': `Bearer ${savedToken}` } });
                if (userRes.ok) {
                    const user = await userRes.json();
                    if (ALLOWED_USERS.includes(user.login)) {
                        await finishLogin(savedToken);
                        return;
                    }
                }
            } catch(e) {}
            localStorage.removeItem('admin_token');
        }
        await handlePopupCallback();
        document.getElementById('popupLoginBtn').addEventListener('click', openOAuthPopup);
    }

    function escapeHtml(s) { return String(s || '').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    document.getElementById('addBlogBtn')?.addEventListener('click', addBlog);
    document.getElementById('addNoticeBtn')?.addEventListener('click', addNotice);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    init();
</script>
</body>
</html>
